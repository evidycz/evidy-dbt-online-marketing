version: 2

models:
  - name: ads__sources
    description: "Source / Medium-level marketing performance combining GA4 engagement metrics with aggregated ad spend. Joins Google Analytics sessions, users, purchases, and revenue with total advertising costs by date, key name, and source/medium."
    config:
      tags: ["marketing"]
      meta:
        label: "Sources"
        order_fields_by: "index"
        metrics:
          pno:
            type: number
            label: "PNO"
            description: "Share of advertising costs on revenue"
            sql: "${total_ads_cost_final} / NULLIF(${total_revenue_final}, 0)"
            format: "0.00%"
          roas:
            type: number
            label: "ROAS"
            description: "Return on ad spend"
            sql: "${total_revenue_final} / NULLIF(${total_ads_cost_final}, 0)"
            round: 2
            format: "#,##0.00"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date_day
            - key_name
            - source_medium
    columns:
      - name: date_day
        tests:
          - not_null
        config:
          meta:
            dimension:
              label: "Date"
              type: date
              time_intervals:
                - DAY
                - WEEK
                - MONTH
                - QUARTER
                - YEAR
                - DAY_OF_WEEK_INDEX
                - DAY_OF_WEEK_NAME
                - DAY_OF_MONTH_NUM
                - DAY_OF_YEAR_NUM
                - WEEK_NUM
                - MONTH_NUM
                - MONTH_NAME
                - QUARTER_NUM
                - QUARTER_NAME
                - YEAR_NUM

      - name: key_name
        tests:
          - not_null
        config:
          meta:
            dimension:
              label: "Key Name"
              type: string

      - name: source_medium
        tests:
          - not_null
        config:
          meta:
            dimension:
              label: "Source / Medium"
              type: string

      - name: currency_code
        config:
          meta:
            dimension:
              label: "Currency Code"
              type: string

      - name: sessions
        config:
          meta:
            dimension:
              hidden: true
            metrics:
              total_sessions:
                type: sum
                label: "Sessions"
                description: "Total sessions"

      - name: engaged_sessions
        config:
          meta:
            dimension:
              hidden: true
            metrics:
              total_engaged_sessions:
                type: sum
                label: "Engaged Sessions"
                description: "Total engaged sessions"

      - name: total_users
        config:
          meta:
            dimension:
              hidden: true
            metrics:
              total_users:
                type: sum
                label: "Total Users"
                description: "Total users"

      - name: new_users
        config:
          meta:
            dimension:
              hidden: true
            metrics:
              total_new_users:
                type: sum
                label: "New Users"
                description: "Total new users"

      - name: purchases
        config:
          meta:
            dimension:
              hidden: true
            metrics:
              total_purchases:
                type: sum
                label: "Purchases"
                description: "Total purchases"

      - name: revenue_final
        config:
          meta:
            dimension:
              hidden: true
            metrics:
              total_revenue_final:
                type: sum
                label: "Revenue"
                description: "Total revenue in reporting currency"
                round: 2
                format: '#,##0.00'

      - name: ads_cost_final
        config:
          meta:
            dimension:
              hidden: true
            metrics:
              total_ads_cost_final:
                type: sum
                label: "Ad Spend"
                description: "Total ad spend in reporting currency"
                round: 2
                format: '#,##0.00'
